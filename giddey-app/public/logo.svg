<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="ballGrad" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#f97316"/>
      <stop offset="100%" stop-color="#ea580c"/>
    </linearGradient>
    <clipPath id="circleClip">
      <circle cx="256" cy="256" r="240"/>
    </clipPath>
  </defs>

  <!-- Background circle -->
  <rect width="512" height="512" rx="100" fill="#0a0e17"/>

  <!-- Basketball circle -->
  <circle cx="256" cy="256" r="220" fill="url(#ballGrad)"/>

  <!-- Basketball seam lines -->
  <g clip-path="url(#circleClip)" stroke="#0a0e17" stroke-width="8" fill="none" stroke-linecap="round">
    <!-- Horizontal seam -->
    <path d="M 36 256 Q 256 200, 476 256" />
    <path d="M 36 256 Q 256 312, 476 256" />
    <!-- Vertical seam -->
    <path d="M 256 36 Q 200 256, 256 476" />
    <path d="M 256 36 Q 312 256, 256 476" />
  </g>

  <!-- G Letter -->
  <text x="256" y="290" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-weight="900" font-size="220" fill="#0a0e17" opacity="0.9">G</text>
</svg>
